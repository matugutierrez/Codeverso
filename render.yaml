services:
  - type: web
    name: codeverso
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: codeverso-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
      - key: PORT
        value: "3000"

databases:
  - name: codeverso-db
    plan: free
